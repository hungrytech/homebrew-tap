name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ macos-15-intel, macos-26 ]
        include:
          - os: ubuntu-latest
            container:
              image: ghcr.io/homebrew/brew:main
              options: --privileged
    runs-on: ${{ matrix.os }}
    container: ${{ fromJSON(toJSON(matrix.container)) }} # zizmor: ignore[unpinned-images]
    permissions:
      actions: read
      checks: read
      contents: read
      packages: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Base64-encode GITHUB_TOKEN for HOMEBREW_DOCKER_REGISTRY_TOKEN
        id: base64-encode
        if: github.event_name == 'pull_request'
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base64_token=$(echo -n "${TOKEN}" | base64 | tr -d "\n")
          echo "::add-mask::${base64_token}"
          echo "token=${base64_token}" >> "${GITHUB_OUTPUT}"

      - run: brew test-bot --only-formulae --root-url=https://ghcr.io/v2/hungrytech/tap
        if: github.event_name == 'pull_request'
        env:
          HOMEBREW_DOCKER_REGISTRY_TOKEN: ${{ steps.base64-encode.outputs.token }}

      - name: Stage bottles in the GitHub workspace
        if: always() && github.event_name == 'pull_request'
        shell: bash
        run: |
          tap_repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$tap_repo" != homebrew-* ]]; then
            tap_repo="homebrew-$tap_repo"
          fi
          tap_path="$(brew --repository)/Library/Taps/${GITHUB_REPOSITORY%%/*}/$tap_repo"
          find "$tap_path" -maxdepth 1 -type f -name '*.bottle.*' -exec cp {} "$GITHUB_WORKSPACE/" \;
          compgen -G "$GITHUB_WORKSPACE/*.bottle.*" >/dev/null

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
          if-no-files-found: error
