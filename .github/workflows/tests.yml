name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            bottle: false
          - os: macos-26
            bottle: true
          - os: ubuntu-latest
            bottle: true
            container:
              image: ghcr.io/homebrew/brew:main
              options: --privileged
    runs-on: ${{ matrix.os }}
    container: ${{ fromJSON(toJSON(matrix.container)) }} # zizmor: ignore[unpinned-images]
    permissions:
      actions: read
      checks: read
      contents: read
      packages: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect WikiBrain formula changes
        id: wikibrain-changes
        shell: bash
        run: |
          if git diff --quiet origin/main...HEAD -- Formula/wikibrain.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Base64-encode GITHUB_TOKEN for HOMEBREW_DOCKER_REGISTRY_TOKEN
        id: base64-encode
        if: github.event_name == 'pull_request'
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base64_token=$(echo -n "${TOKEN}" | base64 | tr -d "\n")
          echo "::add-mask::${base64_token}"
          echo "token=${base64_token}" >> "${GITHUB_OUTPUT}"

      - run: brew test-bot --only-formulae --root-url=https://ghcr.io/v2/hungrytech/tap
        if: github.event_name == 'pull_request'
        env:
          HOMEBREW_DOCKER_REGISTRY_TOKEN: ${{ steps.base64-encode.outputs.token }}

      - name: Test source install where dependency bottles are unavailable
        if: >-
          github.event_name == 'pull_request' &&
          steps.wikibrain-changes.outputs.changed == 'true' &&
          !matrix.bottle
        run: |
          brew install --build-from-source hungrytech/tap/wikibrain
          brew test hungrytech/tap/wikibrain

      - name: Stage bottles in the GitHub workspace
        if: >-
          always() && github.event_name == 'pull_request' &&
          steps.wikibrain-changes.outputs.changed == 'true' &&
          matrix.bottle
        shell: bash
        run: |
          search_roots=("$GITHUB_WORKSPACE" "$RUNNER_TEMP" "$HOME" "$(brew --repository)")
          for root in "${search_roots[@]}"; do
            [[ -d "$root" ]] || continue
            while IFS= read -r -d '' bottle; do
              destination="$GITHUB_WORKSPACE/$(basename "$bottle")"
              if [[ "$bottle" != "$destination" ]]; then
                cp -f "$bottle" "$destination"
              fi
            done < <(find "$root" -type f -name 'wikibrain--*.bottle.*' -print0)
          done
          compgen -G "$GITHUB_WORKSPACE/wikibrain--*.bottle.*" >/dev/null

      - name: Upload bottles as artifact
        if: >-
          always() && github.event_name == 'pull_request' &&
          steps.wikibrain-changes.outputs.changed == 'true' &&
          matrix.bottle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: 'wikibrain--*.bottle.*'
          if-no-files-found: error
