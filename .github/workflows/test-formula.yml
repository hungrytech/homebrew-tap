name: Manual source-install smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: macos-15
    steps:
      - name: Tap repository
        run: brew tap hungrytech/tap

      - name: Install WikiBrain from source
        run: brew install --build-from-source hungrytech/tap/wikibrain

      - name: Test WikiBrain
        run: brew test hungrytech/tap/wikibrain
